name: 'Run Greetings API Tests'
description: 'Runs tests on specific environment'

inputs:
  environment:
    description: 'Target environment (dev, stg, preprod, prod)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout course-js-api-framework repository
      uses: actions/checkout@v6
      with:
        repository: mtararujs/course-js-api-framework
        path: course-js-api-framework

    - name: Install npm dependencies
      shell: bash
      working-directory: course-js-api-framework
      run: npm install

    - name: Run tests against environment
      shell: bash
      working-directory: course-js-api-framework
      run: npm run greetings greetings-${{ inputs.environment }}
